<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Mock A — Checkout · Delivery mode</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Source+Sans+3:wght@400;500;600;700&family=Source+Serif+4:opsz,wght@8..60,600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="mocks-shared.css" />
    <style>
      .shell {
        min-height: 100vh;
        display: flex;
        flex-direction: column;
      }
      .bar {
        background: var(--forest);
        color: var(--white);
        padding: 14px 18px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        font-size: 14px;
        font-weight: 600;
      }
      .bar button {
        background: none;
        border: none;
        color: var(--white);
        cursor: pointer;
        font: inherit;
        opacity: 0.9;
      }
      .demo-tabs {
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
        padding: 16px 18px;
        background: var(--apm-header);
        border-bottom: 1px solid var(--border);
      }
      .demo-tabs button {
        font-family: var(--font-ui);
        border: 1px solid var(--border);
        background: var(--white);
        color: var(--forest);
        padding: 8px 14px;
        border-radius: 999px;
        font-size: 12px;
        font-weight: 600;
        cursor: pointer;
      }
      .demo-tabs button.active {
        background: var(--forest);
        color: var(--white);
        border-color: var(--forest);
      }
      main {
        flex: 1;
        padding: 20px 18px 32px;
        max-width: 440px;
        margin: 0 auto;
        width: 100%;
      }
      .panel {
        background: var(--cream-card);
        border-radius: var(--radius-lg);
        padding: 22px 20px;
        box-shadow: var(--shadow);
        border: 1px solid var(--border);
      }
      h1 {
        font-family: var(--font-display);
        font-size: 1.35rem;
        color: var(--forest);
        margin: 0 0 6px;
      }
      .caption {
        font-size: 13px;
        color: var(--muted);
        margin: 0 0 18px;
      }
      .order-line {
        display: flex;
        justify-content: space-between;
        font-size: 14px;
        padding: 10px 0;
        border-top: 1px solid var(--border);
      }
      .order-line:first-of-type {
        border-top: none;
      }
      .modes {
        display: flex;
        flex-direction: column;
        gap: 10px;
        margin-top: 8px;
      }
      .mode {
        border: 1px solid var(--border);
        border-radius: var(--radius-md);
        padding: 14px 14px 12px;
        background: var(--white);
        text-align: left;
        cursor: pointer;
        position: relative;
        transition: box-shadow 0.15s, border-color 0.15s;
      }
      .mode.selected {
        border-color: var(--forest);
        box-shadow: 0 0 0 2px rgba(0, 66, 54, 0.12);
      }
      .mode.disabled {
        opacity: 0.48;
        cursor: not-allowed;
        background: #fafafa;
      }
      .mode-head {
        display: flex;
        align-items: flex-start;
        justify-content: space-between;
        gap: 10px;
      }
      .mode-title {
        font-weight: 700;
        font-size: 15px;
        color: var(--forest);
        display: flex;
        align-items: center;
        gap: 8px;
      }
      .badge {
        font-size: 10px;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 0.06em;
        padding: 3px 8px;
        border-radius: 999px;
        background: rgba(248, 130, 30, 0.18);
        color: #a3550a;
      }
      .badge.neutral {
        background: rgba(0, 66, 54, 0.1);
        color: var(--forest);
      }
      .eta {
        font-size: 13px;
        font-weight: 600;
        color: var(--text-body);
        white-space: nowrap;
      }
      .meta {
        font-size: 12px;
        color: var(--muted);
        margin-top: 6px;
        line-height: 1.45;
      }
      .trust {
        font-size: 12px;
        color: var(--forest);
        margin-top: 8px;
        display: flex;
        align-items: flex-start;
        gap: 6px;
      }
      .trust::before {
        content: "";
        width: 6px;
        height: 6px;
        border-radius: 50%;
        background: var(--carrot);
        margin-top: 5px;
        flex-shrink: 0;
      }
      .alert {
        margin-top: 12px;
        padding: 12px 12px;
        border-radius: var(--radius-sm);
        background: var(--danger-bg);
        border: 1px solid var(--danger-border);
        font-size: 12px;
        line-height: 1.45;
        color: #5c2e0a;
      }
      .alert strong {
        color: var(--forest);
      }
      .cta {
        margin-top: 20px;
        width: 100%;
        font-family: var(--font-ui);
        font-weight: 700;
        font-size: 15px;
        padding: 14px;
        border: none;
        border-radius: var(--radius-md);
        background: var(--carrot);
        color: var(--white);
        cursor: pointer;
      }
      .cta:disabled {
        opacity: 0.45;
        cursor: not-allowed;
      }
      .fine {
        text-align: center;
        font-size: 11px;
        color: var(--muted);
        margin: 10px 0 0;
      }
      .hidden {
        display: none !important;
      }
    </style>
  </head>
  <body>
    <div class="shell">
      <header class="bar">
        <button type="button" aria-label="Back">← Checkout</button>
        <span>Delivery</span>
        <button type="button" aria-label="Help">?</button>
      </header>
      <div class="demo-tabs" role="tablist" aria-label="Preview states for reviewer">
        <button type="button" class="active" data-state="available">State: Available</button>
        <button type="button" data-state="zone">State: Outside pilot zone</button>
        <button type="button" data-state="basket">State: Basket too large</button>
      </div>
      <main>
        <div class="panel" id="panel">
          <h1>How should we deliver?</h1>
          <p class="caption">Johnson Center · 2 items · Meet outside</p>
          <div class="hairline"></div>
          <div class="order-line"><span>Subtotal</span><span>$18.42</span></div>
          <div class="order-line"><span>Service</span><span>$2.99</span></div>

          <div class="modes" role="radiogroup" aria-label="Delivery mode">
            <!-- Human always available in demo -->
            <button type="button" class="mode selected" data-mode="human" id="m-human">
              <div class="mode-head">
                <div>
                  <div class="mode-title">Shopper delivery <span class="badge neutral">Human</span></div>
                  <div class="meta">Curbside or door handoff · Widest basket &amp; add-ons</div>
                </div>
                <span class="eta">28–38 min</span>
              </div>
              <div class="meta">+$0 pilot zone</div>
            </button>

            <button type="button" class="mode" data-mode="robot" id="m-robot">
              <div class="mode-head">
                <div>
                  <div class="mode-title">Sidewalk robot <span class="badge">Pilot</span></div>
                  <div class="meta">Autonomous rover · Pin unlock at arrival</div>
                </div>
                <span class="eta" id="robot-eta">18–26 min</span>
              </div>
              <div class="trust" id="robot-trust">Monitored by remote support. You’ll see exact vehicle + route after checkout.</div>
              <div class="alert hidden" id="robot-zone-msg">
                <strong>Not available for this address.</strong> Autonomous delivery is limited to the GMU pilot zone (on-campus &
                adjacent housing). Switch address or choose shopper delivery.
              </div>
              <div class="alert hidden" id="robot-basket-msg">
                <strong>Robot can’t take this basket.</strong> Today’s rover envelope is about two bags / ~25 lb. Remove a few items or
                choose shopper delivery for this order.
              </div>
            </button>

            <button type="button" class="mode" data-mode="drone" id="m-drone">
              <div class="mode-head">
                <div>
                  <div class="mode-title">Aerial (limited beta) <span class="badge">≤20% trips</span></div>
                  <div class="meta">Small basket · Approved landing zone required</div>
                </div>
                <span class="eta" id="drone-eta">14–22 min</span>
              </div>
              <div class="trust" id="drone-trust">Wing-class corridor. We’ll confirm landing eligibility before you pay.</div>
              <div class="alert hidden" id="drone-zone-msg">
                <strong>No aerial corridor here.</strong> Drone handoff isn’t cleared for this pin. Robot or shopper still available where
                eligible.
              </div>
              <div class="alert hidden" id="drone-basket-msg">
                <strong>Payload too heavy for aerial beta.</strong> Trim to a small bag (~2.5 lb class) or choose robot / shopper.
              </div>
            </button>
          </div>

          <button type="button" class="cta" id="place-order">Place order · $24.12</button>
          <p class="fine">Tax estimated · MFC dock &amp; custody per pilot SOP</p>
        </div>
      </main>
    </div>
    <script>
      const states = {
        available: () => {
          setModeEnabled("m-robot", true);
          setModeEnabled("m-drone", true);
          hideAllAlerts();
          document.getElementById("place-order").disabled = false;
        },
        zone: () => {
          setModeEnabled("m-robot", false);
          setModeEnabled("m-drone", false);
          hideAllAlerts();
          document.getElementById("robot-zone-msg").classList.remove("hidden");
          document.getElementById("drone-zone-msg").classList.remove("hidden");
          selectHuman();
          document.getElementById("place-order").disabled = false;
        },
        basket: () => {
          setModeEnabled("m-robot", false);
          setModeEnabled("m-drone", false);
          hideAllAlerts();
          document.getElementById("robot-basket-msg").classList.remove("hidden");
          document.getElementById("drone-basket-msg").classList.remove("hidden");
          selectHuman();
          document.getElementById("place-order").disabled = false;
        },
      };

      function hideAllAlerts() {
        document.querySelectorAll(".alert").forEach((el) => el.classList.add("hidden"));
      }

      function setModeEnabled(id, on) {
        const el = document.getElementById(id);
        el.classList.toggle("disabled", !on);
        el.disabled = !on;
        el.querySelectorAll(".trust").forEach((t) => t.classList.toggle("hidden", !on));
      }

      function selectHuman() {
        document.querySelectorAll(".mode").forEach((m) => m.classList.remove("selected"));
        document.getElementById("m-human").classList.add("selected");
      }

      document.querySelector(".modes").addEventListener("click", function (e) {
        const btn = e.target.closest(".mode");
        if (!btn || btn.classList.contains("disabled")) return;
        document.querySelectorAll(".mode").forEach((m) => m.classList.remove("selected"));
        btn.classList.add("selected");
      });

      document.querySelectorAll(".demo-tabs button").forEach((b) => {
        b.addEventListener("click", () => {
          document.querySelectorAll(".demo-tabs button").forEach((x) => x.classList.remove("active"));
          b.classList.add("active");
          states[b.dataset.state]();
        });
      });

      states.available();
    </script>
  </body>
</html>
